# task 1
comprehensive_research_task:
  description: >
    Research {topic} in medical and biological literature. Start with systematic searches
    in PubMed, Google Scholar, and institutional databases to map the research landscape.
    Identify 10 high-quality sources prioritizing: (1) peer-reviewed studies and systematic
    reviews from last 5 years, (2) clinical guidelines from recognized medical institutions,
    (3) reports from health organizations (WHO, NIH, CDC). Evaluate each source for study
    design quality, sample size adequacy, statistical methods, conflict of interest
    disclosures, and citation impact. Ensure representation of diverse research groups
    and triangulate key findings across studies.
  
  expected_output: >
    Annotated bibliography of 10 sources. Each entry includes: complete citation with
    DOI/PMID when available; source type and credibility assessment (journal impact factor,
    study design, institution); comprehensive summary covering research question, methodology,
    sample characteristics, key findings, statistical significance, limitations, and clinical
    relevance to {topic}.
  
  agent: researcher

# task 2
synthesis_and_analysis_task:
  description: >
    Synthesize the scientific literature into a cohesive analysis of current biomedical
    knowledge on {topic}. Identify patterns in findings across studies, noting consistency
    of effects, dose-response relationships, or mechanistic pathways. Organize evidence
    thematically by: pathophysiology, clinical outcomes, therapeutic approaches, or
    diagnostic methods as appropriate. Present level of evidence for key claims (e.g.,
    multiple RCTs vs. observational studies). Address conflicting results by examining
    methodological differences, population variations, or temporal factors. Identify
    research gaps including understudied populations, missing mechanistic links, or
    methodological limitations. Maintain scientific precision in terminology.
  
  expected_output: >
    Scientific synthesis (800-1200 words) structured as: Current Evidence Base (major
    findings with strength of evidence), Key Discoveries and Mechanisms (significant
    advances in understanding), Controversies and Inconsistencies (conflicting findings
    with methodological context), and Research Gaps (understudied areas and limitations).
    Use precise biomedical terminology, cite specific studies for claims, and indicate
    evidence quality.
  
  context:
    - comprehensive_research_task
  agent: researcher

# task 3
final_report_creation_task:
  description: >
    Create a scientific report from the synthesis suitable for clinical or research
    audiences. Structure: executive summary highlighting clinical significance, introduction
    establishing medical context and scope, findings organized by biological mechanism
    or clinical domain, discussion interpreting evidence quality and clinical implications,
    and conclusion addressing research directions and translational potential. Maintain
    scientific rigor while ensuring clarity. Use standard medical abbreviations after
    definition, include relevant clinical parameters, and reference evidence strength
    for key claims. Format references in AMA or APA style as appropriate for medical
    literature.
  
  expected_output: >
    Complete medical research report (1800-2500 words) in Markdown format with: Executive
    Summary (clinical significance and key findings), Introduction (medical background
    and research scope), Findings (organized by mechanism/domain with clear subheadings),
    Discussion (evidence interpretation, clinical implications, study limitations),
    Conclusion (summary and research directions), and References (APA format with DOI/PMID).
    Maintain scientific precision, define specialized terms, use active voice, and ensure
    appropriate hedging for uncertain findings.
  
  context:
    - synthesis_and_analysis_task
  agent: reporting_analyst